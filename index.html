<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a" id="meta-theme-color">
  <meta charset="UTF-8" />
  <title>G.S. Tutorial – Interactive Learning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <!-- Force no caching - CRITICAL FOR UPDATES -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Include html2canvas for capturing screenshots -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <!-- Include Noto Sans font for better Unicode support -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <!-- Service Worker UNREGISTER script - Completely disables caching -->
  <script>
    // ========== COMPLETELY DISABLE SERVICE WORKER AND CACHING ==========
    (function() {
      // Unregister all service workers immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function(success) {
              if (success) console.log('✅ Service Worker unregistered');
            });
          }
        });
        
        // Prevent any new service workers from registering
        navigator.serviceWorker.addEventListener('register', function(e) {
          e.preventDefault();
        });
      }
      
      // Clear all caches
      if ('caches' in window) {
        caches.keys().then(function(cacheNames) {
          return Promise.all(
            cacheNames.map(function(cacheName) {
              return caches.delete(cacheName);
            })
          );
        });
      }
      
      // Clear storage
      localStorage.clear();
      sessionStorage.clear();
    })();
  </script>
  
  <style>
    /* ===== ORIGINAL STYLES - COMPLETELY PRESERVED ===== */
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default !important;
    }

    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.light-mode {
      background: #f3f4f6;
      background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, #f3f4f6 100%);
      color: #1f2937;
    }

    /* ===== LOADING ANIMATIONS ===== */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    .loading-spinner {
      border: 4px solid rgba(59, 130, 246, 0.2);
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    .loading-spinner-small {
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
    }

    .loading-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-shimmer {
      background: linear-gradient(90deg, 
        rgba(30, 41, 59, 0.3) 0%, 
        rgba(30, 41, 59, 0.5) 50%, 
        rgba(30, 41, 59, 0.3) 100%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite;
    }

    .loading-container {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      grid-column: 1/-1;
    }

    .loading-text {
      font-size: 1.1rem;
      margin-top: 15px;
      color: #93c5fd;
    }

    .loading-subtext {
      font-size: 0.9rem;
      margin-top: 8px;
      color: #6b7280;
    }

    /* Skeleton loading */
    .skeleton-card {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 12px;
      padding: 20px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(75, 85, 99, 0.3);
    }

    .skeleton-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(75, 85, 99, 0.5);
      margin-bottom: 10px;
      animation: pulse 1.5s infinite;
    }

    .skeleton-title {
      width: 80px;
      height: 20px;
      background: rgba(75, 85, 99, 0.5);
      border-radius: 4px;
      margin-bottom: 8px;
      animation: pulse 1.5s infinite;
    }

    .skeleton-desc {
      width: 120px;
      height: 16px;
      background: rgba(75, 85, 99, 0.5);
      border-radius: 4px;
      animation: pulse 1.5s infinite;
    }

    /* Card animations */
    .class-card, .subject-card {
      transition: all 0.2s ease;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    .class-card:nth-child(1) { animation-delay: 0.05s; }
    .class-card:nth-child(2) { animation-delay: 0.1s; }
    .class-card:nth-child(3) { animation-delay: 0.15s; }
    .class-card:nth-child(4) { animation-delay: 0.2s; }
    .class-card:nth-child(5) { animation-delay: 0.25s; }
    .class-card:nth-child(6) { animation-delay: 0.3s; }
    .class-card:nth-child(7) { animation-delay: 0.35s; }
    .class-card:nth-child(8) { animation-delay: 0.4s; }

    .subject-card:nth-child(1) { animation-delay: 0.05s; }
    .subject-card:nth-child(2) { animation-delay: 0.1s; }
    .subject-card:nth-child(3) { animation-delay: 0.15s; }
    .subject-card:nth-child(4) { animation-delay: 0.2s; }
    .subject-card:nth-child(5) { animation-delay: 0.25s; }
    .subject-card:nth-child(6) { animation-delay: 0.3s; }

    /* ===== FIXED HEADER - Mobile optimized ===== */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(2, 6, 23, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      z-index: 1000;
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    body.light-mode .fixed-header {
      background: rgba(255, 255, 255, 0.98);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
